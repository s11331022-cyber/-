
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的音樂戰報 Pro</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --sidebar: #0a0a0a; --card: rgba(30, 30, 30, 0.6); --accent: #FF0000; --text: #EAEAEA; --sub: #A0A0A0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background-color: var(--sidebar); padding: 40px 30px; display: flex; flex-direction: column; border-right: 1px solid #222; }
        .profile { display: flex; align-items: center; gap: 15px; margin-bottom: 50px; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(45deg, #f00, #500); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        .username h2 { font-size: 18px; font-weight: 600; }
        .username p { color: var(--sub); font-size: 12px; }
        .global-stats { margin-top: auto; }
        .stat-item { margin-bottom: 20px; }
        .stat-label { color: var(--sub); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { font-size: 24px; font-weight: 800; color: var(--text); }
        .main { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
        select { background: #222; color: #fff; border: 1px solid #444; padding: 10px 20px; border-radius: 30px; font-size: 14px; outline: none; cursor: pointer; transition: 0.2s; }
        select:hover { border-color: var(--accent); }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        
        /* 新增：下方兩大圖表的佈局 */
        .grid-chart { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 400px; }
        .grid-chart-full { grid-column: span 2; }

        .card { background: var(--card); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s, border-color 0.2s; position: relative; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border-color: rgba(255,0,0,0.4); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .card-link { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; }
        .kpi-title { color: var(--sub); font-size: 13px; margin-bottom: 5px; }
        .kpi-value { font-size: 28px; font-weight: 700; background: linear-gradient(to right, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .kpi-sub { font-size: 12px; color: var(--accent); margin-top: 5px; display: flex; align-items: center; gap: 5px; }
        .icon-link::after { content: '↗'; font-size: 14px; margin-left: 5px; opacity: 0.7; }
        .chart-header { font-size: 16px; font-weight: 600; margin-bottom: 10px; color: #ddd; }
        
        /* 圖表容器充滿卡片 */
        .chart-container { flex: 1; min-height: 0; } 

        @media (max-width: 900px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; padding: 20px; flex-direction: row; justify-content: space-between; align-items: center; }
            .global-stats { display: none; }
            .profile { margin-bottom: 0; }
            .grid, .grid-chart { grid-template-columns: 1fr; height: auto; }
            .main { padding: 20px; }
        }
    </style>
</head>

        function decodeUtf8(base64) {
            const binaryString = window.atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return new TextDecoder().decode(bytes);
        }
        
        function updateUI() {
            const m = document.getElementById('monthSelector').value;
            const d = db[m];
            
            document.getElementById('kpi_plays').innerText = d.stats.plays;
            
            document.getElementById('kpi_artist').innerText = d.stats.top_artist;
            document.getElementById('link_artist').href = d.stats.link_artist;
            
            document.getElementById('kpi_song').innerText = d.stats.top_song;
            document.getElementById('link_song').href = d.stats.link_song;
            
            document.getElementById('kpi_div').innerText = d.stats.diversity;
            
            injectChart('chart1', decodeUtf8(d.chart1));
            injectChart('chart2', decodeUtf8(d.chart2));
            injectChart('chart3', decodeUtf8(d.chart3));
        }
        
        function injectChart(id, html) {
            const container = document.getElementById(id);
            const range = document.createRange();
            range.selectNode(container);
            const fragment = range.createContextualFragment(html);
            container.innerHTML = '';
            container.appendChild(fragment);
        }
        
        updateUI();
    </script>
