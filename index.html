<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Year Recapped - 音樂戰報 Pro</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #000000; 
            --sidebar: #0f0f0f; 
            --card: rgba(35, 35, 35, 0.7); 
            --accent: #FF0033; /* YT Music Red */
            --gradient: linear-gradient(135deg, #FF0033 0%, #6600CC 100%);
            --text: #FFFFFF; 
            --sub: #AAAAAA; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Noto Sans TC', sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        /* Sidebar Styles */
        .sidebar { 
            width: 300px; 
            background-color: var(--sidebar); 
            padding: 50px 30px; 
            display: flex; 
            flex-direction: column; 
            border-right: 1px solid #222; 
        }
        .profile { display: flex; align-items: center; gap: 15px; margin-bottom: 50px; }
        .avatar { 
            width: 65px; height: 65px; border-radius: 50%; 
            background: var(--gradient); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 28px; font-weight: 900; 
            box-shadow: 0 0 30px rgba(255, 0, 51, 0.4); 
        }
        .username h2 { font-size: 22px; font-weight: 800; letter-spacing: -1px; }
        .username p { color: var(--sub); font-size: 13px; }

        /* Main Content */
        .main { flex: 1; padding: 50px; overflow-y: auto; background: radial-gradient(circle at top right, #1a0033 0%, #000 50%); }
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }
        h1 { font-size: 48px; font-weight: 900; letter-spacing: -2px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        select { 
            background: #1a1a1a; color: #fff; border: 1px solid #333; 
            padding: 12px 25px; border-radius: 50px; font-size: 14px; 
            font-weight: 600; outline: none; cursor: pointer; transition: 0.3s; 
        }
        select:hover { border-color: var(--accent); background: #252525; }

        /* Grid System */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; margin-bottom: 30px; }
        
        .card { 
            background: var(--card); backdrop-filter: blur(20px); 
            border-radius: 24px; padding: 30px; 
            border: 1px solid rgba(255,255,255,0.08); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; 
        }
        .card:hover { 
            transform: scale(1.03); 
            border-color: rgba(255,0,51,0.5); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
            background: rgba(45, 45, 45, 0.8);
        }

        .kpi-title { color: var(--sub); font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .kpi-value { font-size: 36px; font-weight: 900; margin-bottom: 5px; word-break: break-word; }
        .kpi-sub { font-size: 14px; color: var(--accent); font-weight: 600; }

        .chart-card { grid-column: span 2; min-height: 400px; }
        .chart-header { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        @media (max-width: 1100px) {
            .chart-card { grid-column: span 1; }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; padding: 30px; border-right: none; border-bottom: 1px solid #222; }
            .main { padding: 30px; }
            h1 { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="profile">
            <div class="avatar">Y</div>
            <div class="username">
                <h2>Recap Pro</h2>
                <p>專屬於你的音樂戰報</p>
            </div>
        </div>
        <div style="margin-top: auto; color: var(--sub); font-size: 12px; line-height: 1.6;">
            數據來源：你的聆聽歷史<br>自動生成於 Google AI Studio
        </div>
    </div>
    
    <div class="main">
        <div class="header">
            <div>
                <p style="color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 2px;">Your History</p>
                <h1>我的回顧</h1>
            </div>
            <select id="monthSelector" onchange="updateUI()">
                <option value="2026-02">2026年 2月</option>
                <option value="2026-01">2026年 1月</option>
                <option value="2025-12">2025年 12月</option>
                <option value="2025-11">2025年 11月</option>
            </select>
        </div>
        
        <div class="grid">
            <div class="card">
                <div class="kpi-title">播放總量</div>
                <div class="kpi-value" id="kpi_plays">1,245</div>
                <div class="kpi-sub">↑ 較上月增長 12%</div>
            </div>
            <div class="card">
                <div class="kpi-title">年度藝人</div>
                <div class="kpi-value" id="kpi_artist" style="font-size: 24px;">Sabrina 胡恂舞</div>
                <div class="kpi-sub">陪伴了你 480 分鐘</div>
            </div>
            <div class="card">
                <div class="kpi-title">最愛單曲</div>
                <div class="kpi-value" id="kpi_song" style="font-size: 20px;">Are You There</div>
                <div class="kpi-sub">循環播放了 52 次</div>
            </div>
            <div class="card">
                <div class="kpi-title">音樂靈魂</div>
                <div class="kpi-value" id="kpi_div">162</div>
                <div class="kpi-sub">位獨特藝人</div>
            </div>
        </div>

        <div class="grid">
            <div class="card chart-card">
                <div class="chart-header">🔥 聽歌時段分佈</div>
                <div id="chart3" style="height: 350px;"></div>
            </div>
            <div class="card chart-card">
                <div class="chart-header">📊 藝人熱度排行</div>
                <div id="chart1" style="height: 350px;"></div>
            </div>
        </div>
    </div>

            "2025-11": { /* ...你的資料... */ }
        };

        function updateUI() {
            const m = document.getElementById('monthSelector').value;
            // 這裡加入更新畫面的邏輯...
            console.log("切換至：" + m);
        }
    </script>
</body>
</html>
